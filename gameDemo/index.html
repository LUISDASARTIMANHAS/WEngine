<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engine 0.0.2</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container-fluid py-3">
      <div class="row g-3">
        <section class="col-lg-9">
          <div class="card shadow-sm">
            <div
              class="card-header d-flex justify-content-between align-items-center"
            >
              <strong>Viewport</strong>
              <span class="badge text-bg-dark">Engine 0.0.2</span>
            </div>

            <div class="card-body p-2">
              <canvas id="gameCanvas" width="1366" height="720"> </canvas>
            </div>
          </div>
        </section>

        <aside class="col-lg-3">
          <div class="card shadow-sm mb-3">
            <div class="card-header">
              <strong>Debug</strong>
            </div>
            <div class="card shadow-sm mt-3">
              <div class="card-header">
                <strong>Minimapa</strong>
              </div>
              <div class="card-body text-center">
                <canvas id="minimapCanvas" width="220" height="220"></canvas>
              </div>
            </div>
            <div class="card-body">
              <div>
                <strong>Player HP:</strong>
                <span id="debug-player-hp">0/0</span>
              </div>
              <div><strong>FPS:</strong> <span id="debug-fps">0</span></div>
              <div>
                <strong>Entidades:</strong> <span id="debug-entities">0</span>
              </div>
              <div>
                <strong>Player X:</strong> <span id="debug-player-x">0</span>
              </div>
              <div>
                <strong>Player Y:</strong> <span id="debug-player-y">0</span>
              </div>
            </div>
          </div>

          <div class="card shadow-sm">
            <div class="card-header">
              <strong>Controles</strong>
            </div>
            <div class="card-body">
              <p class="mb-2">
                Mover: <strong>W A S D</strong> ou <strong>Setas</strong>
              </p>
              <p class="mb-0">Objetivo: testar loop, câmera e colisão.</p>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
